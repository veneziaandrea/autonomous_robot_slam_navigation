local_costmap:
   global_frame: map
   robot_base_frame: base_footprint
   update_frequency: 5.0
   publish_frequency: 2.0
   static_map: false
   rolling_window: true
   width: 6.0
   height: 6.0
   resolution: 0.05
   transform_tolerance: 0.4 #maximum amount of latency allowed between tf
   track_unknown_space: false

   plugins:
    - {name: obstacle_layer,      type: "costmap_2d::VoxelLayer"}
    - {name: inflation_layer,     type: "costmap_2d::InflationLayer"}

      #cost_scaling_factor and inflation_radius were now moved to the inflation_layer ns
   inflation_layer:
      enabled:              true
      cost_scaling_factor:  15.0  # exponential rate at which the obstacle cost drops off (default: 10) #15 works decently
      inflation_radius:     0.5  # max. distance from an obstacle at which costs are incurred for planning paths. #0.5 works decent
