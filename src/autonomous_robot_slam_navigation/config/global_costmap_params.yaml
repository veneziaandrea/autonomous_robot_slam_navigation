global_costmap:
   
   global_frame: map
   robot_base_frame: base_footprint
   update_frequency: 1.0
   publish_frequency: 0.5
   static_map: true
   transform_tolerance: 0.4
   track_unknown_space: true  # le celle ignote sono considerate ostacoli
   plugins:
     - {name: static_layer,            type: "costmap_2d::StaticLayer"}
     - {name: inflation_layer,         type: "costmap_2d::InflationLayer"}

        #cost_scaling_factor and inflation_radius were now moved to the inflation_layer ns
   inflation_layer:
      enabled:              true
      cost_scaling_factor:  6.5  # exponential rate at which the obstacle cost drops off (default: 10)
      inflation_radius:     0.7  # max. distance from an obstacle at which costs are incurred for planning paths.